name: React CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

env:
  NODE_VERSION: "18"

jobs:
  build:
    name: Build React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Install dependencies
      - name: Install Dependencies
        working-directory: ./vida-cortex
        run: npm ci

      # Build React app
      - name: Build App
        working-directory: ./vida-cortex
        run: npm run build

      # Archive build output
      - name: Archive Build
        run: zip -r react-app.zip vida-cortex/dist

      # Upload artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-app
          path: react-app.zip

  sast:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Semgrep
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "auto"

      # Gitleaks
      - name: Run Gitleaks
        run: |
         docker run --rm -v ${{ github.workspace }}:/path zricethezav/gitleaks:latest detect \
          --source="/path" \
          --verbose \
          --redact

      # Trivy
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: [build, sast]

    defaults:
      run:
        working-directory: ./vida-cortex

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      # Configure AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Deploy to S3
      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete
